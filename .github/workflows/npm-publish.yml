name: Publish to npm

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check package
        run: npm run check

      - name: Select publish version
        id: version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          npm whoami --registry=https://registry.npmjs.org >/dev/null

          package_name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          while npm view "${package_name}@${version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; do
            npm version patch --no-git-tag-version
            version="$(node -p "require('./package.json').version")"
          done

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Commit version update
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json package-lock.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: npm publish --access public
